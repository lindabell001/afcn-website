# netlify.toml - SPA Routing for React Router + Vite

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Build settings for Vite
[build]
  command = "npm run build"
  publish = "dist"

# Cache control for better performance
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
