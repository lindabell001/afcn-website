<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Test</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0c2340; color: white; padding: 40px; text-align: center; }
    button { background: #c8102e; color: white; padding: 20px 40px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Basic JavaScript Test</h1>
  <button onclick="runTest()">Click Me</button>
  <p id="result"></p>

  <script>
    console.log("✅ JavaScript is running on this page");

    function runTest() {
      alert("✅ Button works! JavaScript is executing.");
      document.getElementById('result').innerHTML = '✅ Button clicked successfully!';
    }
  </script>
</body>
</html>
