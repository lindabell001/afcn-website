<form id="joinForm">
    <label>Full Name *</label>
    <input type="text" id="full_name" required>
    <label>Email Address *</label>
    <input type="email" id="email" required>
    <label>Phone Number</label>
    <input type="tel" id="phone">
    <label>City *</label>
    <input type="text" id="city" required>
    <label>State *</label>
    <input type="text" id="state" maxlength="2" required>
    <label>Zip Code *</label>
    <input type="text" id="zip" required>
    <label>Neighborhood / Community *</label>
    <input type="text" id="neighborhood" required>
    <label>County *</label>
    <input type="text" id="county" required>

    <label>Primary Issues / Committees of Observation (Select all that apply)</label>
    <div class="checkbox-group">
      <label>Border Security & Immigration <input type="checkbox" class="issue" value="Border Security & Immigration"></label>
      <label>Election Integrity <input type="checkbox" class="issue" value="Election Integrity"></label>
      <label>Education Freedom & Parental Rights <input type="checkbox" class="issue" value="Education Freedom & Parental Rights"></label>
      <label>Economy, Trade & Tariffs <input type="checkbox" class="issue" value="Economy, Trade & Tariffs"></label>
      <label>2nd Amendment Rights <input type="checkbox" class="issue" value="2nd Amendment Rights"></label>
      <label>Government Efficiency (DOGE) <input type="checkbox" class="issue" value="Government Efficiency (DOGE)"></label>
      <label>Healthcare Freedom & MAHA <input type="checkbox" class="issue" value="Healthcare Freedom & MAHA"></label>
      <label>Crime, Law & Order <input type="checkbox" class="issue" value="Crime, Law & Order"></label>
      <label>Energy Dominance <input type="checkbox" class="issue" value="Energy Dominance"></label>
      <label>Religious Liberty <input type="checkbox" class="issue" value="Religious Liberty"></label>
      <label>Anti-DEI / Merit-Based Systems <input type="checkbox" class="issue" value="Anti-DEI / Merit-Based Systems"></label>
      <label>Foreign Policy – America First <input type="checkbox" class="issue" value="Foreign Policy – America First"></label>
      <label>Veterans Affairs <input type="checkbox" class="issue" value="Veterans Affairs"></label>
      <label>Housing Affordability <input type="checkbox" class="issue" value="Housing Affordability"></label>
      <label>Anti-Censorship / Free Speech <input type="checkbox" class="issue" value="Anti-Censorship / Free Speech"></label>
      <label>Pro-Family & Pro-Natalist Policies <input type="checkbox" class="issue" value="Pro-Family & Pro-Natalist Policies"></label>
    </div>

    <label>Other / Custom Issues</label>
    <input type="text" id="other_issues" placeholder="Type any additional issues, separated by commas">

    <label>Why are you joining? Why are you ready to fight? *</label>
    <textarea id="why_joining" rows="5" required></textarea>

    <button type="submit">Submit Application</button>
  </form>
</div>

<script>
  const form = document.getElementById('joinForm');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const issues = Array.from(document.querySelectorAll('.issue:checked')).map(cb => cb.value);
    const other = document.getElementById('other_issues').value.trim();
    if (other) issues.push(...other.split(',').map(i => i.trim()).filter(i => i));

    const data = {
      full_name: document.getElementById('full_name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      city: document.getElementById('city').value,
      state: document.getElementById('state').value,
      zip: document.getElementById('zip').value,
      neighborhood: document.getElementById('neighborhood').value,
      county: document.getElementById('county').value,
      issues: issues,
      why_joining: document.getElementById('why_joining').value
    };

    const SUPABASE_URL = 'https://iqdnboowzqdiwnymmtwi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YppyBKac2iPCymEzmnicUQ_dHHnqPOZ';

    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/members`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        alert('Application submitted successfully! Norine will review it soon.');
        form.reset();
      } else {
        alert('Error submitting application. Please try again.');
      }
    } catch (error) {
      alert('Connection error. Please try again later.');
    }
  });
</script>

</body>
</html>
