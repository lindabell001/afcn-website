<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join America First Citizens Network</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(to bottom, #0c2340, #1e3a5f); 
      color: white; 
      text-align: center; 
      padding: 40px 20px; 
      margin: 0; 
    }
    .container { 
      max-width: 600px; 
      margin: 0 auto; 
      background: rgba(255,255,255,0.1); 
      padding: 40px; 
      border-radius: 15px; 
      backdrop-filter: blur(10px); 
    }
    h1 { color: #ffd700; margin-bottom: 10px; }
    p { margin-bottom: 30px; }
    input, textarea, button { 
      width: 100%; 
      padding: 14px; 
      margin: 10px 0; 
      border-radius: 8px; 
      border: none; 
      font-size: 16px; 
    }
    input, textarea { background: white; color: black; }
    button { 
      background: #c8102e; 
      color: white; 
      font-weight: bold; 
      cursor: pointer; 
      font-size: 18px; 
    }
    button:hover { background: #a00d24; }
    .success { color: #4CAF50; }
    .error { color: #f44336; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Join America First Citizens Network</h1>
    <p>Become part of the movement. Connect with patriots in your neighborhood, city, district, and state.</p>

    <form id="signupForm">
      <input type="text" id="firstName" placeholder="First Name" required>
      <input type="text" id="lastName" placeholder="Last Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <input type="text" id="address" placeholder="Address (Street, City, State, ZIP)" required>
      <input type="password" id="password" placeholder="Create Password (min 6 characters)" required>
      <textarea id="whyJoining" placeholder="Why do you want to join America First Citizens Network? What are your main areas of interest or concern?" rows="5" required></textarea>
      <input type="text" id="xHandle" placeholder="X Handle(s) or type 'none'" required>
      
      <button type="submit">Join AFCN Now – $25/year</button>
    </form>

    <p id="message"></p>
  </div>

  <script type="module">
    import { supabase } from './supabaseClient.js';

    const form = document.getElementById('signupForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = "Processing...";
      message.className = '';

      try {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const password = document.getElementById('password').value;
        const whyJoining = document.getElementById('whyJoining').value.trim();
        const xHandle = document.getElementById('xHandle').value.trim();

        console.log("Attempting Supabase signup for:", email);   // ← Debug

        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              first_name: firstName,
              last_name: lastName,
              phone: phone,
              address: address,
              why_joining: whyJoining,
              x_handle: xHandle,
              membership_status: "pending"
            }
          }
        });

        if (error) {
          console.error("Supabase Error:", error);
          message.className = 'error';
          message.textContent = "Error: " + error.message;
        } else {
          console.log("Supabase success:", data);
          message.className = 'success';
          message.textContent = "Account created! Redirecting to payment...";
          
          // Go to payment
          setTimeout(() => {
            window.location.href = "https://givingtools.com/give/4206";
          }, 800);
        }
      } catch (err) {
        console.error("Unexpected error:", err);
        message.className = 'error';
        message.textContent = "Something went wrong. Please try again.";
      }
    });
  </script>
</body>
</html>
